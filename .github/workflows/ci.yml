name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.IPTV_CI_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting (auto-fix + commit on dirty)
        run: |
          set -e
          if ! dart format --output=none --set-exit-if-changed .; then
            echo "Auto-formatting dirty files..."
            dart format .
            git config user.email "openclaw@threel.site"
            git config user.name "小七 (OpenClaw)"
            git remote set-url origin https://x-access-token:${{ secrets.IPTV_CI_TOKEN }}@github.com/aqiyoung/iptv-app.git
            git add -A
            if ! git diff --staged --quiet; then
              git commit -m "style: auto-fix dart format"
              git push
              echo "Committed and pushed dart format fixes"
            fi
          fi

      - name: Analyze
        # --no-fatal-infos: info 级 lints (例如 prefer_const_constructors) 
        # 不阻断 CI, 避免老板提交后被一个不重要的 lint 警告打归.
        # error + warning 仍 fatal.  卡 6 修复后收敛.
        run: flutter analyze --no-fatal-infos --fatal-warnings

      - name: Run tests
        run: flutter test
