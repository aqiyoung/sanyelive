name: Source Sync

# v0.3.7+76 (6/19): Source Sync workflow 增强
# 跟 v0.3.7+75 跑通的极简结构 (7 step) 比,  +4 个东西:
# 1. Auto-commit step:  探测后有 diff → commit + push
# 2. Telegram 失败通知:  workflow 失败 → 老板 @xiaozht_bot 震一下
# 3. iptv-org upstream SHA:  commit message 写 iptv-org commit SHA 溯源
# 4. dry_run 重新支持:  workflow_dispatch 加 dry_run input,  用 env 隔离
#
# 触发:
#   - schedule:  每天 02:00 UTC
#   - workflow_dispatch:  手动 (可选 dry_run=true)
#   - push:  改了 scripts/*.py 或 assets/data/*.json

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'only probe no commit'
        type: boolean
        default: false
  push:
    paths:
      - 'scripts/discover_known_sources.py'
      - 'scripts/sync_known_sources.py'
      - 'scripts/discover_cctv_sources.py'
      - 'scripts/sync_cctv_top1.py'
      - 'assets/data/known_sources.json'
      - 'assets/data/cctv_candidates.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.IPTV_CI_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: mkdir -p scripts
      - name: decide dry_run
        id: dry_run_check
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_INPUTS_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${EVENT_INPUTS_DRY_RUN}" = "true" ]; then
            echo "DRY_RUN=true" >> "$GITHUB_OUTPUT"
          else
            echo "DRY_RUN=false" >> "$GITHUB_OUTPUT"
          fi
      - name: discover_known_sources (dry)
        if: steps.dry_run_check.outputs.DRY_RUN == 'true'
        run: cd scripts && python3 discover_known_sources.py --workers 30 --timeout 5 || true
      - name: discover_known_sources
        if: steps.dry_run_check.outputs.DRY_RUN != 'true'
        run: cd scripts && python3 discover_known_sources.py --workers 30 --timeout 5
      - name: sync_known_sources (dry)
        if: steps.dry_run_check.outputs.DRY_RUN == 'true'
        run: cd scripts && python3 sync_known_sources.py --dry-run --max-per-channel 3 || true
      - name: sync_known_sources
        if: steps.dry_run_check.outputs.DRY_RUN != 'true'
        run: cd scripts && python3 sync_known_sources.py --max-per-channel 3 || true
      - name: sync_cctv_top1 (dry)
        if: steps.dry_run_check.outputs.DRY_RUN == 'true'
        run: cd scripts && python3 sync_cctv_top1.py --dry-run || true
      - name: sync_cctv_top1
        if: steps.dry_run_check.outputs.DRY_RUN != 'true'
        run: cd scripts && python3 sync_cctv_top1.py || true
      - name: discover_cctv_sources
        if: steps.dry_run_check.outputs.DRY_RUN != 'true'
        run: cd scripts && python3 discover_cctv_sources.py --workers 30 --timeout 5 || true
      - name: iptv-org upstream SHA
        if: steps.dry_run_check.outputs.DRY_RUN != 'true'
        id: iptv_org_sha
        run: |
          sha=$(curl -sS -m 10 https://api.github.com/repos/iptv-org/iptv/commits/master | python3 -c 'import json,sys; print(json.load(sys.stdin).get("sha","?")[:7])' 2>/dev/null || echo unknown)
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
      - name: report diff
        if: steps.dry_run_check.outputs.DRY_RUN != 'true'
        run: |
          echo "=== 变更统计 ==="
          git diff --stat assets/data/known_sources.json assets/data/cctv_sources.json assets/data/candidates.json || echo "无变更"
      - name: auto-commit
        if: steps.dry_run_check.outputs.DRY_RUN != 'true'
        env:
          IPTV_ORG_SHA: ${{ steps.iptv_org_sha.outputs.sha }}
        run: |
          git config user.email "openclaw@threel.site"
          git config user.name "小七 (OpenClaw)"
          if git diff --quiet assets/data/known_sources.json assets/data/cctv_sources.json assets/data/candidates.json; then
            echo "no changes"
            exit 0
          fi
          DEAD=$(git diff assets/data/known_sources.json | grep -E '^\-' | grep -c 'http' || true)
          ADDED=$(git diff assets/data/known_sources.json | grep -E '^\+' | grep -c 'http' || true)
          echo "new: $ADDED, dead: $DEAD"
          git add assets/data/known_sources.json assets/data/cctv_sources.json assets/data/candidates.json
          MSG="chore(sources): auto-update iptv-org (upstream ${IPTV_ORG_SHA}, new ${ADDED}/dead ${DEAD})|bot=OpenClaw workflow=Source Sync"
          git commit -m "${MSG//|/ }"
          # v0.3.7+79 fix (6/19): GHA checkout 是 detached HEAD,  main 是 worktree.
          #  - v0.3.7+78 修法 git branch -f main HEAD 报
          #    "cannot force update the branch 'main' used by worktree"
          #  - 正确修法: 不创建本地分支,  直接 git push origin HEAD:main
          #    (force push HEAD ref 到远端 main ref)
          git remote set-url origin https://x-access-token:${{ secrets.IPTV_CI_TOKEN }}@github.com/aqiyoung/sanyelive.git
          git push -f origin HEAD:main
          echo "done"
      - name: telegram notify failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "${TG_TOKEN}" ] && [ -n "${TG_CHAT}" ]; then
            MSG="⚠️ *sanyelive Source Sync failed*%0ARun: \`${RUN_ID}\`%0ACommit: \`${SHA}\`%0A[看日志](${SERVER}/${REPO}/actions/runs/${RUN_ID})"
            curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" --data-urlencode "chat_id=${TG_CHAT}" --data-urlencode "parse_mode=Markdown" --data-urlencode "text=${MSG}"
          else
            echo "Telegram secrets not set, skip"
          fi
      - name: telegram notify success
        if: success() && steps.dry_run_check.outputs.DRY_RUN != 'true'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          IPTV_ORG_SHA: ${{ steps.iptv_org_sha.outputs.sha }}
        run: |
          if [ -n "${TG_TOKEN}" ] && [ -n "${TG_CHAT}" ]; then
            if ! git diff --quiet HEAD~1 assets/data/known_sources.json 2>/dev/null; then
              ADDED=$(git diff HEAD~1 assets/data/known_sources.json | grep -E '^\+' | grep -c 'http' || true)
              DEAD=$(git diff HEAD~1 assets/data/known_sources.json | grep -E '^\-' | grep -c 'http' || true)
              curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                -d chat_id="${TG_CHAT}" \
                -d text="✅ sanyelive sources: new ${ADDED} dead ${DEAD} (iptv-org ${IPTV_ORG_SHA})"
            fi
          fi
