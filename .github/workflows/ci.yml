name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.IPTV_CI_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting (auto-fix + commit on dirty)
        run: |
          set -e
          # v0.3.6+44: 区分 push 事件和 PR 事件.
          #  PR 事件: GITHUB_HEAD_REF 非空, checkout 到 PR 源分支后 push.
          #  push 事件: GITHUB_HEAD_REF 为空, 直接用 GITHUB_REF_NAME 推送.
          if [ -n "${GITHUB_HEAD_REF:-}" ]; then
            # PR context: detached HEAD → checkout 到 PR 源分支
            git fetch origin "refs/heads/${GITHUB_HEAD_REF}:refs/remotes/origin/${GITHUB_HEAD_REF}"
            git checkout -B "${GITHUB_HEAD_REF}" "origin/${GITHUB_HEAD_REF}"
            echo "Reattached to PR branch: ${GITHUB_HEAD_REF}"
            PUSH_REF="${GITHUB_HEAD_REF}"
          else
            # push 事件: 已经在正确分支上, 直接 push
            echo "Push event on branch: ${GITHUB_REF_NAME}"
            PUSH_REF="${GITHUB_REF_NAME}"
          fi
          if dart format --output=none . 2>/dev/null; then
            echo "Format check passed — no changes needed"
          else
            echo "Format issues found — auto-fixing..."
            dart format .
            git config user.email "openclaw@threel.site"
            git config user.name "小七 (OpenClaw)"
            git remote set-url origin https://x-access-token:${{ secrets.IPTV_CI_TOKEN }}@github.com/aqiyoung/iptv-app.git
            git add -A
            if ! git diff --staged --quiet; then
              git commit -m "style: auto-fix dart format"
              git push origin "HEAD:refs/heads/${PUSH_REF}"
              echo "Committed and pushed dart format fixes to ${PUSH_REF}"
            fi
          fi

      - name: Analyze
        # --no-fatal-infos: info 级 lints (例如 prefer_const_constructors) 
        # 不阻断 CI, 避免老板提交后被一个不重要的 lint 警告打归.
        # error + warning 仍 fatal.  卡 6 修复后收敛.
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        # v0.3.8+125 (6/21): 恢复 fatal — 11 个 test fail 全部修通 (commit 323384f).
        # 之前 v0.3.8+124 临时 || echo skip 不阻塞出包,  现在恢复严格检查:
        # 任何 test fail 都会阻断 CI (跟 analyze --no-fatal-infos 一致,
        #  info 级 lint 不阻断,  但 test 必须 0 fail).
        run: flutter test
