name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Bootstrap android/ios/ scaffold if missing
        run: |
          set -e
          # We hand-wrote pubspec.yaml + lib/ + test/, but did NOT hand-write
          # the android/ and ios/ Gradle/Pod projects. Bootstrap them via
          # flutter create without overwriting our existing files.
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            flutter create --org com.threely.iptv --project-name iptv_app \
              --platforms=android,ios .
          fi
          # flutter create is additive by default; verify our files are intact
          test -f pubspec.yaml
          test -f lib/main.dart
          test -f test/widget_test.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
