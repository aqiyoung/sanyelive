name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 需要 contents: write 权限, 否则 softprops/action-gh-release 会 403
# (默认 GITHUB_TOKEN 只有 read 权限)
permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      - name: Restore keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.IPTV_KEYSTORE_BASE64 }}
        run: |
          set -e
          mkdir -p android
          echo "$KEYSTORE_BASE64" | base64 -d > android/iptv-release.jks
          ls -la android/iptv-release.jks
          keytool -list -keystore android/iptv-release.jks \
            -storepass "${{ secrets.IPTV_KEYSTORE_PASSWORD }}" 2>&1 | head -10

      - name: Write android/key.properties
        env:
          STORE_FILE: iptv-release.jks
          STORE_PASSWORD: ${{ secrets.IPTV_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.IPTV_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.IPTV_KEY_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storeFile=$STORE_FILE
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          cat android/key.properties

      - name: Bootstrap android/ios scaffold if missing
        run: |
          set -e
          # 卡 6 修复: 只在 ios 缺时创建, 不要再 regenerate android (会覆盖老板提交的
          # android/settings.gradle + android/app/build.gradle 修改)
          if [ ! -d "ios" ]; then
            flutter create --org com.threely.iptv --project-name iptv_app \
              --platforms=ios .
          fi
          # android 在 git 里有, 不要重建
          test -f pubspec.yaml
          test -f lib/main.dart
          test -f test/widget_test.dart

      - name: Patch screen_brightness_android for Kotlin 1.x compat
        run: |
          # screen_brightness_android 2.x 用 Kotlin 2.0+ 的 compilerOptions DSL
          # 跟 Flutter 3.24 默认 Kotlin 1.9.22 不兼容. 注释掉 + 改 compileOptions 1.8 -> 17
          # 跟 Kotlin 默认 jvmTarget=17 一致.
          python3 << 'PYEOF'
          import glob
          for f in glob.glob('/home/runner/.pub-cache/hosted/pub.dev/screen_brightness_android-*/android/build.gradle.kts'):
              with open(f) as fp:
                  src = fp.read()
              marker = 'project.extensions.configure(org.jetbrains.kotlin.gradle.dsl.KotlinAndroidProjectExtension::class.java) {'
              if marker in src:
                  # 找到匹配的 }
                  depth = 0
                  start = src.find(marker)
                  for i in range(start, len(src)):
                      if src[i] == '{':
                          depth += 1
                      elif src[i] == '}':
                          depth -= 1
                          if depth == 0:
                              end = i
                              break
                  block = src[start:end+1]
                  commented = '\n'.join('// ' + l for l in block.split('\n'))
                  src = src[:start] + commented + src[end+1:]
              # 把 sourceCompatibility/targetCompatibility 1_8 -> 17 跟 Kotlin 一致
              src = src.replace('JavaVersion.VERSION_1_8', 'JavaVersion.VERSION_17')
              with open(f, 'w') as fp:
                  fp.write(src)
              print(f'Patched {f}')
          PYEOF


      - name: Patch android/app/build.gradle for signing
        run: |
          set -e
          if ! grep -q "iptvStoreFile" android/app/build.gradle; then
            python3 << 'PYEOF'
          import re
          p = 'android/app/build.gradle'
          with open(p) as f:
              src = f.read()
          # Insert ext.* load block AFTER plugins {} block (Gradle requires
          # plugins {} to be first or right after buildscript/pluginManagement).
          inject = '''
          // Load signing key from android/key.properties (gitignored).
          // Must be AFTER plugins {} block (Gradle syntax).
          def keyPropsFile = rootProject.file('key.properties')
          def keyProps = new Properties()
          if (keyPropsFile.exists()) {
              keyProps.load(new FileInputStream(keyPropsFile))
          }
          // Resolve storeFile relative to the key.properties directory (android/),
          // so a plain "iptv-release.jks" entry points at android/iptv-release.jks
          // instead of being resolved from the :app module (android/app/).
          def _rawStore = keyProps['storeFile'] ?: ''
          def _storeAbs = _rawStore
          if (_rawStore && !_rawStore.startsWith('/') && !_rawStore.contains(':')) {
              _storeAbs = new File(keyPropsFile.parentFile, _rawStore).absolutePath
          }
          ext.iptvStoreFile = _storeAbs
          ext.iptvStorePassword = keyProps['storePassword'] ?: ''
          ext.iptvKeyAlias = keyProps['keyAlias'] ?: ''
          ext.iptvKeyPassword = keyProps['keyPassword'] ?: ''

          '''
          # Insert inject right after the first "plugins { ... }" block
          src = re.sub(r'(plugins\s*\{[^{}]*\}\n)', r'\1' + inject, src, count=1)
          # Add signingConfigs.release right after "android {"
          signing = '''
              signingConfigs {
                  release {
                      if (project.ext.iptvStoreFile) {
                          // ext.iptvStoreFile is already an absolute path
                          // (resolved at load time relative to android/key.properties).
                          storeFile file(project.ext.iptvStoreFile)
                          storePassword project.ext.iptvStorePassword
                          keyAlias project.ext.iptvKeyAlias
                          keyPassword project.ext.iptvKeyPassword
                      }
                  }
              }
          '''
          src = re.sub(r'(\n\s*android\s*\{\n)', r'\1' + signing, src, count=1)
          # Replace any existing buildTypes.release.signingConfig with our reference
          src = re.sub(
              r'buildTypes\s*\{[^{}]*?release\s*\{[^{}]*?\}',
              lambda m: re.sub(
                  r'signingConfig\s*=?\s*\S+',
                  'signingConfig signingConfigs.release',
                  m.group(0)
              ) if 'signingConfig' in m.group(0) else re.sub(
                  r'(release\s*\{[^{}]*?)(\n\s*\})',
                  r'\1\n        signingConfig signingConfigs.release\n\2',
                  m.group(0),
                  count=1
              ),
              src,
              count=1
          )
          with open(p, 'w') as f:
              f.write(src)
          print('Patched', p)
          PYEOF
          fi
          echo "--- patched signing-related lines ---"
          grep -nE "iptvStoreFile|signingConfigs|signingConfig" android/app/build.gradle
          echo "--- top 20 lines of build.gradle ---"
          head -20 android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Check CCTV-5 source health (v0.3.5.1)
        # v0.3.5.1 (6/18): 老板 11:41 装机实测 CCTV-5 加载不出来, 是因为 channels_cn.json
        # 里 CCTV-5 所有源 timeout.  这个 step 在 release build 前先验一次, 防止
        # dead 源混进 APK.  --fail-on-dead-cctv: CCTV-5/-5+ 有 dead 才 fail, 其他
        # channel dead 容忍 (不是本 release 范围).  exit 0 = CCTV-5 源 OK / 容忍, 1 = 必须修.
        run: |
          set -e
          python3 scripts/check_sources.py --fail-on-dead-cctv
          echo "✅ check_sources.py 通过 (CCTV-5 源 OK / 容忍 dead)"

      - name: Build APK (release, signed)
        # 卡 6: 明确 target-platform android-arm64, 减少体积 (电视/手机都是 arm64).
        # flutter build apk 默认是 fat APK (arm + arm64 + x64), 体积接近 60MB;
        # 限定 arm64 后可控制在 20MB 以内.
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi
      - name: Rename APK with sanyelive + version
        run: |
          set -e
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "APK_VERSION=$VERSION" >> $GITHUB_ENV
          for f in build/app/outputs/flutter-apk/app-*-release.apk; do
            if [ -f "$f" ]; then
              ABI=$(basename "$f" | sed 's/app-//' | sed 's/-release.apk//')
              NEWNAME="build/app/outputs/flutter-apk/sanyelive-v${VERSION}-${ABI}.apk"
              mv "$f" "$NEWNAME"
              echo "Renamed: $(basename $f) → $(basename $NEWNAME)"
            fi
          done
          for f in build/app/outputs/flutter-apk/app-*-release.apk.sha256; do
            if [ -f "$f" ]; then
              ABI=$(basename "$f" | sed 's/app-//' | sed 's/-release.apk.sha256//')
              NEWNAME="build/app/outputs/flutter-apk/sanyelive-v${VERSION}-${ABI}.apk.sha256"
              mv "$f" "$NEWNAME"
            fi
          done
      - name: Verify APK signature
        run: |
          set -e
          # v0.2.4 (6/17): Rename 步已将 app-arm64-v8a-release.apk 改名为 sanyelive-v*-arm64-v8a.apk
          # ls 选 sanyelive-*.apk 优先, 兑底 app-release.apk
          APK=$(ls build/app/outputs/flutter-apk/sanyelive-*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(ls build/app/outputs/flutter-apk/app-*-release.apk 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ]; then
            APK=build/app/outputs/flutter-apk/app-release.apk
          fi
          echo "APK=$APK"
          ls -la "$APK"
          SIZE=$(stat -c '%s' "$APK")
          SIZE_MB=$(echo "scale=2; $SIZE/1048576" | bc)
          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          echo "## APK 验证" >> $GITHUB_STEP_SUMMARY
          echo "| 项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 文件 | $APK |" >> $GITHUB_STEP_SUMMARY
          echo "| 大小 | ${SIZE_MB} MB (${SIZE} bytes) |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 | \`$SHA256\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$SHA256" ]; then
            echo "$SHA256  $(basename $APK)" > "$APK.sha256"
          fi
          cat $GITHUB_STEP_SUMMARY
          APKSIGNER=$(find /opt -name 'apksigner' 2>/dev/null | head -1)
          if [ -n "$APKSIGNER" ]; then
            echo "Using apksigner: $APKSIGNER"
            $APKSIGNER verify --verbose "$APK"
            $APKSIGNER verify --print-certs "$APK"
          else
            echo "apksigner not on PATH; falling back to jarsigner"
            jarsigner -verify -verbose:summary -certs "$APK" 2>&1 | head -10
          fi
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "APK_SHA256=$SHA256" >> $GITHUB_ENV
          echo "APK_SIZE_MB=$SIZE_MB" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-app-release
          # v0.2.4 (6/17): Rename 步已改成 sanyelive-v${VERSION}-${ABI}.apk,
          # 跟 Verify 步一致.
          path: |
            build/app/outputs/flutter-apk/sanyelive-*.apk
            build/app/outputs/flutter-apk/sanyelive-*.apk.sha256
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/sanyelive-*.apk
            build/app/outputs/flutter-apk/sanyelive-*.apk.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## 三页直播 ${{ github.ref_name }}

            ### APK 信息
            - **架构**: arm64-v8a (Android TV / 手机 / 盒子)
            - **大小**: ${{ env.APK_SIZE_MB }} MB
            - **SHA256**: `${{ env.APK_SHA256 }}`

            ### 下载
            下载下方 `sanyelive-${{ github.ref_name }}-arm64-v8a.apk` 即可在 Android 设备上安装。
            `.sha256` 文件包含校验值, 可用 `sha256sum` 验证。

            ### 构建信息
            - Flutter: 3.29.3
            - Target: android-arm64, release, split-per-abi
            - Workflow: `.github/workflows/release.yml`
