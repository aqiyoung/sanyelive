name: iptv_app
description: "IPTV 直播 APP - 极简新中式设计 - 家用电视/盒子场景"
publish_to: "none"
version: 0.1.6+7

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # 卡 5: 视频播放 (libmpv based)
  media_kit: ^1.1.10
  # 卡 5: Video 渲染层 (Android/iOS/macOS/Windows/Linux)
  media_kit_video: ^1.0.5
  # 卡 6: 收藏本地存储
  sqflite: ^2.4.1
  path: ^1.9.0
  # 卡 6: 启动恢复 (lastChannelId)
  shared_preferences: ^2.3.3


dependency_overrides:
  # package_info_plus 9.x 跟 Flutter 3.24 Gradle 不兼容 (用 flutter.versionCode 已移除 API)
  # 锁 5.0.0 兼容
  package_info_plus: 5.0.0
  # screen_brightness_android 2.x 需 Android SDK 36 + Kotlin 1.9.x 新 API, Flutter 3.24 不兼容
  # 锁 1.0.1 兼容 (2024-04)
  screen_brightness_android: 1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # 卡 3: freezed 代码生成
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # 卡 5: SourceFailover 单元测试 (mock 异步)
  fake_async: ^1.3.1
  # 卡 5: StreamOpener 抽象注入到 SourceFailover
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/channels_cn.json
    # 卡 6: 公开 m3u8 兌底 (iptv-org 没过出的频道)
    - assets/data/known_sources.json
