name: sanyelive
description: "三页直播 - IPTV 直播 APP - 极简新中式设计 - 家用电视/盒子场景"
publish_to: "none"
# 0.2.1: UI 优化 + libmpv native + 频道中文化 + CCTV5 源 + 状态栏修复
# 0.2.1+10: 包名 com.aqiyoung.iptv_app → com.threelive.iptv
# 0.2.2+11: 修切频道声音残留 + 底部频道条横滑
# 0.2.3+12: 重试/换源按钮 + 收藏页 + 文案实事求是 + TV 焦点环铺全屏
# 0.3.0+14 (6/17 老板拍): 重命名 threelive → sanyelive (pubspec) +
#   com.threelive.iptv → com.threelive.tv (Android applicationId) +
#   Threelive → 三页直播 (app_name / title)
# 0.3.2+15 (6/18): P2-2 v0.3.2 release 后发现 pubspec 没跟 tag 走, 重发
#   让 tag v0.3.2 ↔ APK sanyelive-v0.3.2+15-...apk 一致
# 0.3.3+16 (6/18): P3-1 修播放退出/杀 APP 声音不释放 (player lifecycle leak)
#   Android manifest: android:stopWithTask=true (任务划掉时停)
#   main.dart: WidgetsBindingObserver 监听 paused/inactive/detached
#   router: PlayerRouteObserver pop 时 stop + dispose
#   player_service: stop/dispose 改 public
#   media_kit: 不启用后台 AudioService
#   player_page dispose: 显式 stop
# 0.3.4+17 (6/18): P2-1 集成 TvFocusCapWrap 到 home_page
#   home_page AppBar + 3 分类卡套 TvFocusCap (maxFocusable=9)
#   焦点高亮增强: scale 1.03 → 1.05, 2px 暖色边
#   ChatGPT 6/17 21:18 建议, 老板拍板
# 0.3.5+18 (6/18): P2-2 4 个小优化 (老板 10:27 拍)
#   - 播放页 sports 英文 → 中文 (lib/data/category_zh.dart)
#   - CCTV-5 + 14 卫视 source URL 合并 (assets/data/channels_cn.json)
#   - 强制 IPv4 http.Client, 修 wifi 加载不出来 (lib/core/http/ipv4_client.dart)
#   - 维护脚本 scripts/merge_known_sources.py
# 0.3.5+19 (6/18): v0.3.5.1 hotfix (P0 bug 老板 11:41 装机实测反馈)
#   - CCTV-5 新源 append (保留旧源向后兼容, iptv-org 已无 CCTV-5)
#   - Channel.fromJson 支持 dict 格式 source (混存 145 string + 83 dict)
#     之前 .cast<String>() 在 dict 上 view 不报错但访问 TypeError 炸
#   - 强制 IPv4 http.Client 真机测试 (test/core/http/ipv4_client_test.dart)
#     httpbin.org/ip 验 IPv4, CI 无网 fail (不是 skip)
#   - 维护脚本 scripts/check_sources.py: 测每条 source URL, 列出 dead 源
#     支持 --channel / --fail-on-dead-cctv, exit 0/1 给 CI 用
#   - release workflow 跑 check_sources --fail-on-dead-cctv (CCTV-5 优先)
# 0.3.6+19 (6/18): 暗色主题 + 设置页 + 主题持久化
#   lib/core/theme/theme.dart 加 IptvTheme.dark()
#   lib/core/theme/colors.dart 加 darkBg/darkSurface/darkTextPrimary tokens
#   lib/features/settings/theme_provider.dart (新) — Riverpod + shared_preferences
#   lib/features/settings/settings_page.dart (新) — 系统/浅色/深色 RadioListTile
#   home_page 加齿轮 icon 跳 settings_page
#   test/features/settings/theme_provider_test.dart + test/core/theme/dark_theme_test.dart
# 0.3.6.1 hotfix: 暗色主题 widget 适配 (17 处硬编码 IptvColors 改 colorScheme.*)
#   5 个 widget 文件: favorites/search/category/home/next_channels_strip
#   5 个新 dark theme widget test
#
# 注: pubspec.yaml 的 version 字段是 MAJOR.MINOR.PATCH+BUILD 格式,
# 4 段版本 (如 0.3.6.1) pub get 解析失败. 这里用 0.3.6+20,
# 但 git tag 用 v0.3.6.1 (热修复, 跟 PR 标题一致).
# APK 文件名: sanyelive-v0.3.6.1-arm64-v8a.apk (来自 tag name)
# Android versionName 显示 "0.3.6", versionCode = 20.
version: 0.3.6+20

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # 卡 5: 视频播放 (libmpv based)
  media_kit: ^1.1.10
  # 卡 5: Video 渲染层 (Android/iOS/macOS/Windows/Linux)
  media_kit_video: 1.2.5
  # 卡 7 (6/17 修复): native video dependencies (libmpv .so for Android).
  # 之前 v0.2.0 APK 里没有 libmpv.so, MediaKit.ensureInitialized() 加载失败,
  # catch 住后 Player() 抛 'ensureInitialized must be called'.
  media_kit_libs_video: ^1.0.7
  # 卡 6: 收藏本地存储
  sqflite: ^2.4.1
  path: ^1.9.0
  # 卡 6: 启动恢复 (lastChannelId)
  shared_preferences: ^2.3.3



dependency_overrides:
  # 卡 6 修复: package_info_plus 9.x 跟 Flutter 3.24 Gradle plugin 不兼容
  package_info_plus: 5.0.0
  # screen_brightness_android 2.x 的 compilerOptions 块在 release.yml 用 python 注释掉 (不锁版)
  # wakelock_plus 1.4+ 用 flutter.compileSdkVersion (Flutter 3.35+) 跟 Flutter 3.24 不兼容
  wakelock_plus: 1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # 卡 3: freezed 代码生成
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # 卡 5: SourceFailover 单元测试 (mock 异步)
  fake_async: ^1.3.1
  # 卡 5: StreamOpener 抽象注入到 SourceFailover
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/channels_cn.json
    # 卡 6: 公开 m3u8 兌底 (iptv-org 没过出的频道)
    - assets/data/known_sources.json
