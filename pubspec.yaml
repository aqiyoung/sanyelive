name: sanyelive
description: "三页直播 - IPTV 直播 APP - 极简新中式设计 - 家用电视/盒子场景"
publish_to: "none"
# 0.2.1: UI 优化 + libmpv native + 频道中文化 + CCTV5 源 + 状态栏修复
# 0.2.1+10: 包名 com.aqiyoung.iptv_app → com.threelive.iptv
# 0.2.2+11: 修切频道声音残留 + 底部频道条横滑
# 0.2.3+12: 重试/换源按钮 + 收藏页 + 文案实事求是 + TV 焦点环铺全屏
# 0.3.0+14 (6/17 老板拍): 重命名 threelive → sanyelive (pubspec) +
#   com.threelive.iptv → com.threelive.tv (Android applicationId) +
#   Threelive → 三页直播 (app_name / title)
# 0.3.2+15 (6/18): P2-2 v0.3.2 release 后发现 pubspec 没跟 tag 走, 重发
#   让 tag v0.3.2 ↔ APK sanyelive-v0.3.2+15-...apk 一致
# 0.3.3+16 (6/18): P3-1 修播放退出/杀 APP 声音不释放 (player lifecycle leak)
#   Android manifest: android:stopWithTask=true (任务划掉时停)
#   main.dart: WidgetsBindingObserver 监听 paused/inactive/detached
#   router: PlayerRouteObserver pop 时 stop + dispose
#   player_service: stop/dispose 改 public
#   media_kit: 不启用后台 AudioService
#   player_page dispose: 显式 stop
# 0.3.4+17 (6/18): P2-1 集成 TvFocusCapWrap 到 home_page
#   home_page AppBar + 3 分类卡套 TvFocusCap (maxFocusable=9)
#   焦点高亮增强: scale 1.03 → 1.05, 2px 暖色边
#   ChatGPT 6/17 21:18 建议, 老板拍板
# 0.3.5+18 (6/18): P2-2 4 个小优化 (老板 10:27 拍)
#   - 播放页 sports 英文 → 中文 (lib/data/category_zh.dart)
#   - CCTV-5 + 14 卫视 source URL 合并 (assets/data/channels_cn.json)
#   - 强制 IPv4 http.Client, 修 wifi 加载不出来 (lib/core/http/ipv4_client.dart)
#   - 维护脚本 scripts/merge_known_sources.py
# 0.3.5+19 (6/18): v0.3.5.1 hotfix (P0 bug 老板 11:41 装机实测反馈)
#   - CCTV-5 新源 append (保留旧源向后兼容, iptv-org 已无 CCTV-5)
#   - Channel.fromJson 支持 dict 格式 source (混存 145 string + 83 dict)
#     之前 .cast<String>() 在 dict 上 view 不报错但访问 TypeError 炸
#   - 强制 IPv4 http.Client 真机测试 (test/core/http/ipv4_client_test.dart)
#     httpbin.org/ip 验 IPv4, CI 无网 fail (不是 skip)
#   - 维护脚本 scripts/check_sources.py: 测每条 source URL, 列出 dead 源
#     支持 --channel / --fail-on-dead-cctv, exit 0/1 给 CI 用
#   - release workflow 跑 check_sources --fail-on-dead-cctv (CCTV-5 优先)
# 0.3.6+19 (6/18): 暗色主题 + 设置页 + 主题持久化
#   lib/core/theme/theme.dart 加 IptvTheme.dark()
#   lib/core/theme/colors.dart 加 darkBg/darkSurface/darkTextPrimary tokens
#   lib/features/settings/theme_provider.dart (新) — Riverpod + shared_preferences
#   lib/features/settings/settings_page.dart (新) — 系统/浅色/深色 RadioListTile
#   home_page 加齿轮 icon 跳 settings_page
#   test/features/settings/theme_provider_test.dart + test/core/theme/dark_theme_test.dart
# 0.3.6.1 hotfix: 暗色主题 widget 适配 (17 处硬编码 IptvColors 改 colorScheme.*)
#   5 个 widget 文件: favorites/search/category/home/next_channels_strip
#   5 个新 dark theme widget test
#
# 注: pubspec.yaml 的 version 字段是 MAJOR.MINOR.PATCH+BUILD 格式,
# 4 段版本 (如 0.3.6.1) pub get 解析失败. 这里用 0.3.6+20,
# 但 git tag 用 v0.3.6.1 (热修复, 跟 PR 标题一致).
# APK 文件名: sanyelive-v0.3.6.1-arm64-v8a.apk (来自 tag name)
# Android versionName 显示 "0.3.6", versionCode = 20.
# v0.3.7+21 (6/18): P1 hotfix — 全屏播放 status bar + TopBar 修复
#   老板 12:57 反馈"全屏播放的状态还显示台标 和返回".
#   _buildFullscreenOverlay: 移除 SafeArea (status bar 已隐, SafeArea 反而留
#     padding 让视频被压下, 看着像有顶栏).
#   _TopBar 移进 AnimatedOpacity, 3s 控件隐身时跟节目卡 / 频道横滑一起隐.
#   _toggleFullscreen: 全屏时 setSystemUIOverlayStyle 状态栏透明 + 白图标.
#   退出全屏按钮位置 top=12 (status bar 已隐, 顶到屏幕真正顶部).
#   退出全屏后还原成全 APP 默认 (黑图标 + 浅米色 nav bar, 跟浅米色页面配套).
#   _isMobile 嵌入布局保留 SafeArea + TopBar (v0.3.5 设计的 P2-2 行为不破坏).
# 0.3.7+22 (6/18): v0.3.5.4 主题适配真修 (老板 14:49 拍 "浅色下播放页深色" + "切深色看不清")
#   - player_page.dart: initState/dispose systemUI nav bar 跟 colorScheme 联动
#     (浅色 = surfaceContainer 浅灰, 暗色 = surfaceContainer 深灰)
#   - player_page.dart: 全屏/退出全屏按钮 Material bg + Icon 颜色都跟主题联动
#     (浅色 = 浅底 + 深色图标, 暗色 = 深底 + 浅色图标)
#   - 6 个新 widget test 覆盖浅+暗 主题, 防 v0.3.5.2 + v0.3.6.1 漏修再发
#   - 5 widget 文件 (favorites/search/category/home/next_channels_strip) v0.3.6.1
#     hotfix 已改 17 处, 这次 v0.3.5.4 验证 13 个新 test 都绿, 无新增 chrome 改.
#   pubspec 实际版本 0.3.7+22 (Dart pub 不支持 4 段版本号, Git tag 用
#     v0.3.5.4 跟老板追踪名字保持一致).  Android versionName = "0.3.7",
#     versionCode = 22.
# v0.3.5.3 (6/18): P0 hotfix — CCTV 源 hotfix (16 频道健康分矩阵)
#   老板 14:02 拍板"去找央视的源": v0.3.5 标 CCTV "全活" 实际主备源 (38.75.136.137 /
#   74.91.26.218) 多频道实际死了, iptv-org 6/18 已删 CCTV-5 (版权), 公开 m3u 渠道失效.
#   实测 6 方向调研 (央视频 API / 央视网直播 / GitHub CCTV 仓库 / 各地电信 IPTV /
#   CSS 站 / 自建 nginx+ffmpeg), 拿到 12/16 频道公共源 (CCTV-1/4/4K/6/8/9/10/11/13/
#   14/15 + 卫视频道). CCTV-2/3/5/5+/7/12/16/17 公开 CDN 全部 geo-blocked / 死链,
#   留给老板自建 (终极 fallback, 卡 6 nginx+ffmpeg) + 后续 PR.
#   Channel: 新增 cctvSource 字段 (跟 sources 不冲突), 优先级 cctvSource[0] >
#   sources[0] > iptv-org.  lib/data/cctv_source.dart: 封装选源 + health score +
#   failover.  lib/data/source_dispatcher.dart: CCTV 频道走 cctvSource first.
#   scripts/discover_cctv_sources.py: 30 并发 head+GET 健康分排序, 输出 top 3/频道.
#   scripts/check_sources.py: 加 --require-cctv 标志, v0.3.5.3 release 时启用.
#   test/cctv_source_test.dart: 5 case (cctvSource 解析 / 优先级 / 降级 / 空 / 集成).
#   release workflow 跑 check_sources --require-cctv, CCTV 全部 dead 才 fail.
#   pubspec 实际版本 0.3.5+23 (Dart pub 不支持 4 段版本号, Git tag 用
#   v0.3.5.3 跟老板追踪名字保持一致).  Android versionName = "0.3.5",
#   versionCode = 23.
#   卡里写 v0.3.5.3 用 +21, 但 v0.3.5.2 (+21) + v0.3.5.4 (+22) 都先占了,
#   顺位 +23 才对 — Android versionCode 唯一不冲突.
#   v0.3.5.3 是 v0.3.5.1 之后被推迟的 P0 (老板 14:02 拍板 CCTV 源),
#   跨过了 v0.3.6.1 (暗色) / v0.3.7 (强制更新) / v0.3.5.2 (全屏修复) /
#   v0.3.5.4 (主题真修) 几个 release, 现在做单独 hotfix branch 出 v0.3.5.3.
# v0.3.8-alpha+25 (6/18): P2-3-A 阶段 1 — TvFocus 集成 3 page (fav+search+category)
#   (含 player + home 共 5 page,  本次 PR 只交阶段 1,  阶段 2/3 后续 PR)
#   - TvFocus 加 borderWidth 参数 (默认 2px,  3 米可视场景调到 3-4px)
#   - 字号 14sp → 18-22sp 适配 (TV 端,  通过 deviceTier == tv 判断)
#   - favorites_page / category_page back 按钮 + IconButton 套 TvFocus
#   - search_page 用 TvFocus 替换 KeyboardListener 焦点模拟 (结果 tile 高亮)
#   - home_page 已集成 (P2-1,  本次不动)
#   - 5 page widget test 覆盖焦点状态
#   顺位 +25 跟 v0.3.5.5 (+24) 顺延,  Android versionCode 唯一不冲突
#   (release 流程按 git tag v0.3.5.5 / v0.3.8-alpha 分别出 APK,  不会同时装).
version: 0.3.8-alpha+25

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # 卡 5: 视频播放 (libmpv based)
  media_kit: ^1.1.10
  # 卡 5: Video 渲染层 (Android/iOS/macOS/Windows/Linux)
  media_kit_video: 1.2.5
  # 卡 7 (6/17 修复): native video dependencies (libmpv .so for Android).
  # 之前 v0.2.0 APK 里没有 libmpv.so, MediaKit.ensureInitialized() 加载失败,
  # catch 住后 Player() 抛 'ensureInitialized must be called'.
  media_kit_libs_video: ^1.0.7
  # 卡 6: 收藏本地存储
  sqflite: ^2.4.1
  path: ^1.9.0
  # 卡 6: 启动恢复 (lastChannelId)
  shared_preferences: ^2.3.3
  # v0.3.7+20 (6/18): 后台强制更新 — GitHub release API 拉版本
  dio: ^5.7.0
  # v0.3.7+20 (6/18): 后台强制更新 — APK 下载完调 Android installer
  # (不用 install_plugin 2.1.0 — package 缺 namespace + JVM target 不一致,
  #  AGP 8+ 编译不过. 改用自定义 MethodChannel,  详见 MainActivity.kt.)
  # v0.3.7+20 (6/18): 后台强制更新 — APK 下载完调 Android installer
  # (不用 install_plugin 2.1.0 — package 缺 namespace + JVM target 不一致,
  #  AGP 8+ 编译不过. 改用自定义 MethodChannel,  详见 MainActivity.kt.)
  # v0.3.7+20 (6/18): 后台强制更新 — getTemporaryDirectory 存 APK
  path_provider: ^2.1.0

dependency_overrides:
  # 卡 6 修复: package_info_plus 9.x 跟 Flutter 3.24 Gradle plugin 不兼容
  package_info_plus: 5.0.0
  # screen_brightness_android 2.x 的 compilerOptions 块在 release.yml 用 python 注释掉 (不锁版)
  # wakelock_plus 1.4+ 用 flutter.compileSdkVersion (Flutter 3.35+) 跟 Flutter 3.24 不兼容
  wakelock_plus: 1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # 卡 3: freezed 代码生成
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # 卡 5: SourceFailover 单元测试 (mock 异步)
  fake_async: ^1.3.1
  # 卡 5: StreamOpener 抽象注入到 SourceFailover
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/channels_cn.json
    # 卡 6: 公开 m3u8 兌底 (iptv-org 没过出的频道)
    - assets/data/known_sources.json
